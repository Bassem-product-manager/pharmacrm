name: Keep API awake

# Render free web services sleep after 15 min idle, which stops the BullMQ
# reminder scan (every 15 min) and nightly job. This pings /health every ~10
# min so the worker stays alive and scheduled reminders actually fire.
# Override the URL with a repo variable API_HEALTH_URL if your service differs.
on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          URL="${{ vars.API_HEALTH_URL }}"
          URL="${URL:-https://pharmacrm-api.onrender.com/health}"
          echo "Pinging $URL"
          code=$(curl -s -o /dev/null -w '%{http_code}' --max-time 60 "$URL" || echo 000)
          echo "HTTP $code"
          # Don't fail the workflow on a cold-start timeout; the ping still woke it.
          [ "$code" = "200" ] || echo "::warning::non-200 ($code) — likely cold start, wake ping still sent"
